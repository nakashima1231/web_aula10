<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Detector de Telefone</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    textarea { width: 100%; padding: 10px; font-size: 1rem; }
    button { margin-top: 10px; padding: 10px 24px; cursor: pointer; }
    #resultado { margin-top: 20px; line-height: 2; font-size: 1rem; }
    b { background: #ffd700; padding: 2px 5px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Detector de Telefone</h1>
  <p>Padrão: <code>99999-9999</code></p>
  <textarea id="entrada" rows="6" placeholder="Ex: Ligue para 98765-4321 ou 91234-5678"></textarea><br>
  <button onclick="detectar()">Detectar</button>
  <div id="resultado"></div>
  <script>
    function detectar() {
      const texto = document.getElementById('entrada').value;
      const regex = /\d{5}-\d{4}/g;
      const marcado = texto.replace(regex, m => `<b>${m}</b>`);
      const encontrados = texto.match(regex);
      document.getElementById('resultado').innerHTML =
        marcado.replace(/\n/g, '<br>') +
        (encontrados
          ? `<p> Encontrados: <b>${encontrados.join(', ')}</b></p>`
          : '<p>Nenhum telefone encontrado.</p>');
    }
  </script>
</body>
</html>
