<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Detector de E-mail</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    textarea { width: 100%; padding: 10px; font-size: 1rem; }
    button { margin-top: 10px; padding: 10px 24px; cursor: pointer; }
    #resultado { margin-top: 20px; line-height: 2; font-size: 1rem; }
    b { background: #a7f3d0; padding: 2px 5px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Detector de E-mail</h1>
  <p>Padrão: <code>nome@site.com</code></p>
  <textarea id="entrada" rows="6" placeholder="Ex: Fale com joao@empresa.com ou rh@vagas.com"></textarea><br>
  <button onclick="detectar()">Detectar</button>
  <div id="resultado"></div>
  <script>
    function detectar() {
      const texto = document.getElementById('entrada').value;
      const regex = /\w[\w.+-]*@\w[\w.-]*\.\w+/g;
      const marcado = texto.replace(regex, m => `<b>${m}</b>`);
      const encontrados = texto.match(regex);
      document.getElementById('resultado').innerHTML =
        marcado.replace(/\n/g, '<br>') +
        (encontrados
          ? `<p> Encontrados: <b>${encontrados.join(', ')}</b></p>`
          : '<p>Nenhum e-mail encontrado.</p>');
    }
  </script>
</body>
</html>
